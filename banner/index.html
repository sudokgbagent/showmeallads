<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Download Now</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      box-sizing: border-box;
    }

    *,
    *::before,
    *::after {
      box-sizing: inherit;
    }

    .fallback-image {
      display: block;
      width: 100%;
      height: auto;
      cursor: pointer;
      z-index: 1;
      position: relative;
    }

    .ad-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: auto;
      overflow: hidden;
      position: relative;
      z-index: 2;
    }

    .ad-container iframe {
      display: block;
      max-width: 100%;
      height: auto;
      border: none;
    }
  </style>
</head>

<body>

  <img src="Falcon-Cast-banner-eng.jpeg" alt="Fallback Image" class="fallback-image" id="fallbackImage">

  <div class="ad-container" id="adContainer">

    <!-- Banner 728x90 -->
    <script>
      atOptions = {
        'key': '1683454767cd2f52814e053b00acb62c',
        'format': 'iframe',
        'height': 90,
        'width': 728,
        'params': {}
      };
    </script>

    <script src="https://www.highperformanceformat.com/1683454767cd2f52814e053b00acb62c/invoke.js"></script>

  </div>

  <!-- Social Bar -->
  <script src="https://pl29779929.effectivecpmnetwork.com/c4/8c/fc/c48cfc9448710bd37e2b1a8eefd71d49.js"></script>
  <!-- Popunder -->
  <script src="https://pl29789755.effectivecpmnetwork.com/be/a0/11/bea0115519a5ab0d7d3abfb6e623492d.js"></script>

  <script type="text/javascript">
    function handleFallbackClick() {
      window.location.href =
        'https://www.effectivecpmnetwork.com/bky5ubmt?key=1eac3b1af0d522855e581345e70735a9';
    }

    document
      .getElementById('fallbackImage')
      .addEventListener('click', handleFallbackClick);

    const observer = new MutationObserver((mutationsList) => {
      for (const mutation of mutationsList) {
        if (mutation.type === 'childList') {
          const iframes = document.querySelectorAll('.ad-container iframe');

          if (iframes.length > 0) {
            document.getElementById('fallbackImage').style.display = 'none';

            const iframe = iframes[0];

            setTimeout(() => {
              if (window.AndroidInterface) {
                window.AndroidInterface.onAdSizeReceived(
                  iframe.offsetWidth,
                  iframe.offsetHeight
                );
              }
            }, 100);

            observer.disconnect();
          }
        }
      }
    });

    observer.observe(document.querySelector('.ad-container'), {
      childList: true,
      subtree: true
    });
  </script>

</body>

</html>
