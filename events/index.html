<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0a1628;
  font-family: 'Rajdhani', sans-serif;
}

.banner {
  container-type: size;
  container-name: banner;
  display: flex;
  align-items: stretch;
  width: 100%; height: 100%;
  text-decoration: none;
  color: inherit;
  overflow: hidden;
  background:
    linear-gradient(90deg,
      rgba(0,0,0,.60) 0%,
      rgba(0,0,0,.22) 45%,
      rgba(0,0,0,.18) 60%,
      rgba(0,0,0,.55) 100%),
    url('https://i.ibb.co.com/Kc15MmMQ/fifaleg-tionda.png') center / cover no-repeat;
  cursor: pointer;
}

.logo {
  flex: 0 0 auto;
  width: clamp(40px, 13cqw, 78px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 0 6px;
  background: rgba(0,0,0,.38);
  border-right: 1px solid rgba(255,255,255,.07);
}

.logo img {
  width: 60%;
  max-height: 52%;
  object-fit: contain;
}

.logo-text {
  font-size: clamp(5px, 1.4cqh, 10px);
  font-weight: 700;
  letter-spacing: .1em;
  color: #d4af37;
  text-transform: uppercase;
  line-height: 1;
  text-align: center;
}

.content {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  padding: 0 clamp(8px, 2.5cqw, 20px);
}

.panel {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: clamp(8px, 2cqw, 18px);
}

.primary {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: clamp(2px, .5cqh, 5px);
}

.badge {
  display: inline-flex;
  align-self: flex-start;
  padding: 1px 6px;
  border-radius: 2px;
  font-size: clamp(5px, 1.2cqh, 11px);
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  line-height: 1.3;
}
.badge-live     { background: #e53935; color: #fff; }
.badge-today    { background: rgba(212,175,55,.18); color: #d4af37; }
.badge-tomorrow { background: rgba(66,133,244,.18); color: #7eb8ff; }
.badge-upcoming { background: rgba(66,133,244,.18); color: #7eb8ff; }

.title-row {
  display: flex;
  align-items: baseline;
  gap: clamp(5px, 1.2cqw, 10px);
}
.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(12px, min(5cqh, 7cqw), 44px);
  line-height: 1;
  letter-spacing: .04em;
  color: #fff;
  white-space: nowrap;
}
.year {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(11px, min(4.6cqh, 6.5cqw), 40px);
  line-height: 1;
  color: #d4af37;
}

.match-row {
  display: flex;
  align-items: center;
  gap: clamp(5px, 1.2cqw, 10px);
  flex-wrap: nowrap;
  min-width: 0;
}
.team {
  display: flex;
  align-items: center;
  gap: clamp(3px, .8cqw, 7px);
  min-width: 0;
}
.flag {
  font-size: clamp(10px, min(3cqh, 3.5cqw), 26px);
  line-height: 1;
  flex-shrink: 0;
}
.team-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(11px, min(4cqh, 5.5cqw), 36px);
  line-height: 1;
  letter-spacing: .03em;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.vs {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(9px, min(3cqh, 3.8cqw), 26px);
  line-height: 1;
  color: #d4af37;
  flex-shrink: 0;
}

.info {
  font-size: clamp(5px, min(1.35cqh, 1.8cqw), 13px);
  font-weight: 600;
  letter-spacing: .07em;
  color: rgba(255,255,255,.8);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-transform: uppercase;
}
.info-tagline {
  font-size: clamp(5px, min(1.4cqh, 1.9cqw), 13px);
  font-weight: 700;
  letter-spacing: .04em;
  color: rgba(255,255,255,.88);
}
.info-kickoff {
  font-size: clamp(5px, min(1.25cqh, 1.65cqw), 12px);
  font-weight: 600;
  letter-spacing: .03em;
  color: rgba(255,255,255,.72);
}

.timer {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: clamp(4px, 1cqw, 9px);
  padding-left: clamp(4px, 1cqw, 10px);
  border-left: 1px solid rgba(255,255,255,.12);
}
.box {
  display: flex;
  flex-direction: column;
  align-items: center;
  line-height: 1;
}
.num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(10px, min(3.2cqh, 4cqw), 32px);
  color: #d4af37;
  line-height: 1;
}
.lbl {
  font-size: clamp(4px, min(1cqh, 1.2cqw), 9px);
  font-weight: 600;
  color: rgba(255,255,255,.38);
  text-transform: uppercase;
  letter-spacing: .06em;
}

@container banner (max-height: 100px) {
  .logo-text, .badge, .info-tagline { display: none; }
  .timer { border-left: none; padding-left: 0; }
}
@container banner (max-height: 65px) {
  .logo { width: 36px; padding: 0 3px; }
  .lbl  { display: none; }
}
@container banner (max-width: 380px) {
  .lbl { display: none; }
}
</style>
</head>
<body>

<a class="banner" id="banner" href="https://falconcastapp.org" target="_blank" rel="noopener noreferrer">
  <div class="logo">
    <img src="https://i.ibb.co.com/v6QW1PzT/FIFA-2026-World-Cup-Logo-75.png" alt="FIFA WC 2026" loading="eager">
    <span class="logo-text">FIFA 2026</span>
  </div>
  <div class="content" id="content">
    <div class="panel">
      <div class="primary">
        <div class="title-row">
          <span class="title">World Cup</span>
          <span class="year">2026</span>
        </div>
        <p class="info-tagline">Loading…</p>
      </div>
    </div>
  </div>
</a>

<script>
const TZ = Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';

const SCHEDULE = [
  // Group A
  ["2026-06-11","19:00",0,"Mexico","South Africa","Group A","Mexico City"],
  ["2026-06-12","02:00",0,"South Korea","Czech Republic","Group A","Guadalajara"],
  ["2026-06-18","16:00",0,"Czech Republic","South Africa","Group A","Atlanta"],
  ["2026-06-19","01:00",0,"Mexico","South Korea","Group A","Guadalajara"],
  ["2026-06-24","23:00",0,"South Africa","South Korea","Group A","Kansas City"],
  ["2026-06-24","23:00",0,"Czech Republic","Mexico","Group A","Dallas"],
  // Group B
  ["2026-06-12","23:00",0,"Spain","Curaçao","Group B","Los Angeles"],
  ["2026-06-13","02:00",0,"Brazil","Iraq","Group B","Houston"],
  ["2026-06-18","23:00",0,"Iraq","Curaçao","Group B","Dallas"],
  ["2026-06-19","02:00",0,"Spain","Brazil","Group B","Los Angeles"],
  ["2026-06-25","02:00",0,"Brazil","Curaçao","Group B","Seattle"],
  ["2026-06-25","02:00",0,"Iraq","Spain","Group B","Dallas"],
  // Group C
  ["2026-06-13","18:00",0,"USA","Panama","Group C","Miami"],
  ["2026-06-13","21:00",0,"Uruguay","Ivory Coast","Group C","Dallas"],
  ["2026-06-19","18:00",0,"Panama","Ivory Coast","Group C","Los Angeles"],
  ["2026-06-19","21:00",0,"USA","Uruguay","Group C","Philadelphia"],
  ["2026-06-26","02:00",0,"Panama","Uruguay","Group C","New York"],
  ["2026-06-26","02:00",0,"Ivory Coast","USA","Group C","Kansas City"],
  // Group D
  ["2026-06-13","23:00",0,"Germany","Bosnia & Herzegovina","Group D","San Francisco"],
  ["2026-06-14","02:00",0,"Japan","Ecuador","Group D","Phoenix"],
  ["2026-06-20","18:00",0,"Ecuador","Bosnia & Herzegovina","Group D","Miami"],
  ["2026-06-20","21:00",0,"Germany","Japan","Group D","Chicago"],
  ["2026-06-26","21:00",0,"Ecuador","Germany","Group D","New York"],
  ["2026-06-26","21:00",0,"Bosnia & Herzegovina","Japan","Group D","Houston"],
  // Group E
  ["2026-06-14","18:00",0,"France","Algeria","Group E","New York"],
  ["2026-06-14","21:00",0,"Argentina","Saudi Arabia","Group E","Dallas"],
  ["2026-06-20","23:00",0,"Saudi Arabia","Algeria","Group E","Boston"],
  ["2026-06-21","02:00",0,"France","Argentina","Group E","Los Angeles"],
  ["2026-06-27","01:00",0,"Algeria","Argentina","Group E","Seattle"],
  ["2026-06-27","01:00",0,"Saudi Arabia","France","Group E","Kansas City"],
  // Group F
  ["2026-06-14","23:00",0,"Portugal","Morocco","Group F","Miami"],
  ["2026-06-15","02:00",0,"Belgium","Egypt","Group F","Seattle"],
  ["2026-06-21","18:00",0,"Egypt","Morocco","Group F","Philadelphia"],
  ["2026-06-21","21:00",0,"Portugal","Belgium","Group F","New York"],
  ["2026-06-27","21:00",0,"Morocco","Belgium","Group F","San Francisco"],
  ["2026-06-27","21:00",0,"Egypt","Portugal","Group F","Los Angeles"],
  // Group G
  ["2026-06-15","18:00",0,"England","Sweden","Group G","Miami"],
  ["2026-06-15","21:00",0,"Netherlands","Senegal","Group G","Dallas"],
  ["2026-06-21","23:00",0,"Senegal","Sweden","Group G","Houston"],
  ["2026-06-22","02:00",0,"England","Netherlands","Group G","Chicago"],
  ["2026-06-28","01:00",0,"Sweden","Netherlands","Group G","New York"],
  ["2026-06-28","01:00",0,"Senegal","England","Group G","Philadelphia"],
  // Group H
  ["2026-06-15","23:00",0,"Colombia","Norway","Group H","Boston"],
  ["2026-06-16","02:00",0,"Australia","Turkey","Group H","Los Angeles"],
  ["2026-06-22","18:00",0,"Turkey","Norway","Group H","Seattle"],
  ["2026-06-22","21:00",0,"Colombia","Australia","Group H","New York"],
  ["2026-06-28","21:00",0,"Norway","Australia","Group H","Dallas"],
  ["2026-06-28","21:00",0,"Turkey","Colombia","Group H","Houston"],
  // Group I
  ["2026-06-16","18:00",0,"Switzerland","Cape Verde","Group I","Philadelphia"],
  ["2026-06-16","21:00",0,"Austria","Iran","Group I","Kansas City"],
  ["2026-06-22","23:00",0,"Iran","Cape Verde","Group I","Los Angeles"],
  ["2026-06-23","02:00",0,"Switzerland","Austria","Group I","Seattle"],
  ["2026-06-29","01:00",0,"Cape Verde","Austria","Group I","Chicago"],
  ["2026-06-29","01:00",0,"Iran","Switzerland","Group I","Miami"],
  // Group J
  ["2026-06-16","23:00",0,"Jordan","DR Congo","Group J","Houston"],
  ["2026-06-17","02:00",0,"Qatar","New Zealand","Group J","Seattle"],
  ["2026-06-23","18:00",0,"New Zealand","DR Congo","Group J","Atlanta"],
  ["2026-06-23","21:00",0,"Qatar","Jordan","Group J","Dallas"],
  ["2026-06-29","21:00",0,"DR Congo","Qatar","Group J","Miami"],
  ["2026-06-29","21:00",0,"New Zealand","Jordan","Group J","Phoenix"],
  // Group K
  ["2026-06-17","18:00",0,"Croatia","Uzbekistan","Group K","Dallas"],
  ["2026-06-17","21:00",0,"Ghana","Panama","Group K","Atlanta"],
  ["2026-06-23","23:00",0,"Panama","Uzbekistan","Group K","Phoenix"],
  ["2026-06-24","02:00",0,"Croatia","Ghana","Group K","Houston"],
  ["2026-06-30","01:00",0,"Uzbekistan","Ghana","Group K","San Francisco"],
  ["2026-06-30","01:00",0,"Panama","Croatia","Group K","New York"],
  // Group L
  ["2026-06-17","23:00",0,"Tunisia","Paraguay","Group L","Miami"],
  ["2026-06-18","02:00",0,"Haiti","Scotland","Group L","San Francisco"],
  ["2026-06-24","18:00",0,"Scotland","Paraguay","Group L","Chicago"],
  ["2026-06-24","21:00",0,"Haiti","Tunisia","Group L","New York"],
  ["2026-06-30","21:00",0,"Paraguay","Haiti","Group L","Los Angeles"],
  ["2026-06-30","21:00",0,"Scotland","Tunisia","Group L","Kansas City"],
];

const FLAGS = {
  Mexico:"🇲🇽",Brazil:"🇧🇷",Argentina:"🇦🇷",France:"🇫🇷",Germany:"🇩🇪",
  Spain:"🇪🇸",Portugal:"🇵🇹",England:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",USA:"🇺🇸",Canada:"🇨🇦",
  Japan:"🇯🇵","South Korea":"🇰🇷",Netherlands:"🇳🇱",Belgium:"🇧🇪",
  Croatia:"🇭🇷",Morocco:"🇲🇦",Qatar:"🇶🇦",Switzerland:"🇨🇭",
  "Czech Republic":"🇨🇿","Bosnia & Herzegovina":"🇧🇦",Paraguay:"🇵🇾",
  Australia:"🇦🇺",Turkey:"🇹🇷","Curaçao":"🇨🇼","Ivory Coast":"🇨🇮",
  Ecuador:"🇪🇨",Sweden:"🇸🇪",Tunisia:"🇹🇳",Egypt:"🇪🇬",Iran:"🇮🇷",
  "New Zealand":"🇳🇿","Saudi Arabia":"🇸🇦",Uruguay:"🇺🇾","Cape Verde":"🇨🇻",
  Senegal:"🇸🇳",Iraq:"🇮🇶",Norway:"🇳🇴",Algeria:"🇩🇿",Austria:"🇦🇹",
  Jordan:"🇯🇴","DR Congo":"🇨🇩",Uzbekistan:"🇺🇿",Colombia:"🇨🇴",
  Ghana:"🇬🇭",Panama:"🇵🇦",Haiti:"🇭🇹",Scotland:"🏴󠁧󠁢󠁳󠁣󠁴󠁿","South Africa":"🇿🇦",
};

const MATCHES = SCHEDULE.map(([date, time, offset, t1, t2, group, venue]) => {
  const [y, mo, d] = date.split('-').map(Number);
  const [hh, mm]   = time.split(':').map(Number);
  const start = Date.UTC(y, mo - 1, d, hh - offset, mm);
  return { t1, t2, group, venue, start, end: start + 7_200_000 };
}).sort((a, b) => a.start - b.start);

const pad = n => String(n).padStart(2, '0');

function localDay(ms) {
  return new Intl.DateTimeFormat('en-CA', {
    timeZone: TZ, year: 'numeric', month: '2-digit', day: '2-digit'
  }).format(new Date(ms));
}

function localKickoff(ms) {
  return new Intl.DateTimeFormat(undefined, {
    timeZone: TZ, month: 'long', day: 'numeric',
    hour: 'numeric', minute: '2-digit', hour12: true, timeZoneName: 'short'
  }).format(new Date(ms));
}

function shortKickoff(ms) {
  return new Intl.DateTimeFormat(undefined, {
    timeZone: TZ, month: 'short', day: 'numeric',
    hour: 'numeric', minute: '2-digit', hour12: true
  }).format(new Date(ms));
}

function dayLabel(ms) {
  const d = localDay(ms);
  const today    = localDay(Date.now());
  const tomorrow = localDay(Date.now() + 86_400_000);
  if (d === today)    return 'today';
  if (d === tomorrow) return 'tomorrow';
  return 'upcoming';
}

function countdown(ms) {
  const diff = Math.max(0, ms - Date.now());
  return {
    d: Math.floor(diff / 86_400_000),
    h: Math.floor(diff / 3_600_000 % 24),
    m: Math.floor(diff / 60_000 % 60),
    s: Math.floor(diff / 1_000 % 60),
  };
}

function timerHTML(units) {
  return `<div class="timer">${units.map(([n, l]) =>
    `<div class="box"><span class="num">${pad(n)}</span><span class="lbl">${l}</span></div>`
  ).join('')}</div>`;
}

const f = name => FLAGS[name] || '🏳️';
const content = document.getElementById('content');
let ticker = null;

function tick(fn) {
  clearInterval(ticker);
  fn();
  ticker = setInterval(fn, 1000);
}

function showOpening(match) {
  tick(() => {
    const { d, h, m, s } = countdown(match.start);
    content.innerHTML = `
      <div class="panel">
        <div class="primary">
          <div class="title-row">
            <span class="title">World Cup</span>
            <span class="year">2026</span>
          </div>
          <p class="info-tagline">The biggest show on Earth</p>
          <p class="info-kickoff">${match.t1} vs ${match.t2} &nbsp;·&nbsp; ${shortKickoff(match.start)}</p>
        </div>
        ${timerHTML([[d,'d'],[h,'h'],[m,'m'],[s,'s']])}
      </div>`;
  });
}

function showMatch(match, live) {
  const label = live ? 'live' : dayLabel(match.start);
  const BADGES = {
    live:     ['badge-live',     'Live Now'],
    today:    ['badge-today',    'Today'],
    tomorrow: ['badge-tomorrow', 'Tomorrow'],
    upcoming: ['badge-upcoming', 'Upcoming'],
  };
  const [cls, txt] = BADGES[label] ?? BADGES.upcoming;

  tick(() => {
    const { h, m, s } = countdown(match.start);
    const meta = live
      ? 'Match in progress'
      : `${localKickoff(match.start)} · ${match.group}`;

    content.innerHTML = `
      <div class="panel">
        <div class="primary">
          <span class="badge ${cls}">${txt}</span>
          <div class="match-row">
            <div class="team">
              <span class="flag">${f(match.t1)}</span>
              <span class="team-name">${match.t1}</span>
            </div>
            <span class="vs">VS</span>
            <div class="team">
              <span class="flag">${f(match.t2)}</span>
              <span class="team-name">${match.t2}</span>
            </div>
          </div>
          <p class="info">${meta}</p>
        </div>
        ${live ? '' : timerHTML([[h,'h'],[m,'m'],[s,'s']])}
      </div>`;
  });
}

function run() {
  const now  = Date.now();
  const live = MATCHES.find(m => now >= m.start && now < m.end);
  if (live) return showMatch(live, true);

  const next = MATCHES.find(m => m.start > now);
  if (next) {
    if (now < MATCHES[0].start) return showOpening(next);
    return showMatch(next, false);
  }

  clearInterval(ticker);
  content.innerHTML = `
    <div class="panel">
      <div class="primary">
        <div class="title-row">
          <span class="title">World Cup</span>
          <span class="year">2026</span>
        </div>
        <p class="info-tagline">Tournament complete · See you in 2030!</p>
      </div>
    </div>`;
}

run();
setInterval(run, 60_000);
</script>
</body>
</html>
