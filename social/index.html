<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pray for Chittagong</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0d1a24;
  font-family: 'Inter', sans-serif;
}

.banner {
  container-type: size;
  container-name: banner;
  position: relative;
  display: flex;
  align-items: stretch;
  width: 100%; height: 100%;
  overflow: hidden;
  background: linear-gradient(115deg, #0b1620 0%, #16283570 40%, #1c3140 100%);
}

/* ---- ambient rain (quiet, not decorative-loud) ---- */
.rain {
  position: absolute; inset: 0;
  pointer-events: none;
  opacity: .28;
  overflow: hidden;
}
.rain span {
  position: absolute;
  top: -20%;
  width: 1px;
  height: 18%;
  background: linear-gradient(to bottom, transparent, rgba(148,180,199,.55), transparent);
  animation: fall linear infinite;
}
@keyframes fall {
  to { transform: translateY(145%); }
}

/* ---- candle panel ---- */
.candle-panel {
  flex: 0 0 auto;
  position: relative;
  width: clamp(46px, 14cqw, 90px);
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,.22);
  border-right: 1px solid rgba(224,164,88,.14);
}
.candle {
  width: 44%;
  max-width: 34px;
  filter: drop-shadow(0 0 6px rgba(224,164,88,.45));
}
.flame {
  animation: flicker 2.6s ease-in-out infinite;
  transform-origin: 50% 100%;
}
@keyframes flicker {
  0%, 100% { transform: scaleY(1) scaleX(1) rotate(0deg); opacity: 1; }
  20%      { transform: scaleY(1.06) scaleX(.96) rotate(-1.5deg); opacity: .93; }
  45%      { transform: scaleY(.94) scaleX(1.04) rotate(1.2deg); opacity: 1; }
  70%      { transform: scaleY(1.03) scaleX(.98) rotate(-.8deg); opacity: .96; }
}

/* ---- content ---- */
.content {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  padding: 0 clamp(10px, 3cqw, 26px);
  position: relative;
  z-index: 2;
}
.panel {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: clamp(8px, 2.5cqw, 22px);
}
.primary {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: clamp(2px, .6cqh, 6px);
}

.eyebrow {
  font-size: clamp(5px, min(1.15cqh, 1.5cqw), 11px);
  font-weight: 600;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: rgba(224,164,88,.85);
}

.headline {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 500;
  font-size: clamp(13px, min(6cqh, 8cqw), 46px);
  line-height: 1.05;
  letter-spacing: .01em;
  color: #f1ece0;
  white-space: nowrap;
}

.subtext {
  font-size: clamp(5px, min(1.35cqh, 1.75cqw), 13px);
  font-weight: 400;
  color: rgba(241,236,224,.72);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: .01em;
}

.meta {
  font-size: clamp(5px, min(1.2cqh, 1.55cqw), 11px);
  font-weight: 500;
  letter-spacing: .04em;
  color: rgba(148,180,199,.75);
  text-transform: uppercase;
  white-space: nowrap;
}

/* right-side quiet stat */
.stat {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-left: clamp(6px, 1.4cqw, 14px);
  border-left: 1px solid rgba(148,180,199,.18);
  text-align: center;
  line-height: 1.1;
}
.stat-num {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: clamp(11px, min(3.6cqh, 4.4cqw), 30px);
  color: #e0a458;
}
.stat-lbl {
  font-size: clamp(4px, min(1cqh, 1.2cqw), 9px);
  font-weight: 500;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: rgba(241,236,224,.5);
  margin-top: 2px;
}

@container banner (max-height: 100px) {
  .eyebrow { display: none; }
  .stat-lbl { display: none; }
}
@container banner (max-height: 65px) {
  .candle-panel { width: 38px; }
  .subtext { display: none; }
}
@container banner (max-width: 380px) {
  .stat { display: none; }
  .subtext { display: none; }
}
</style>
</head>
<body>

<div class="banner" id="banner">
  <div class="rain" id="rain"></div>

  <div class="candle-panel">
    <svg class="candle" viewBox="0 0 40 70" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="20" cy="66" rx="10" ry="3" fill="#e0a458" opacity=".18"/>
      <rect x="14" y="28" width="12" height="36" rx="2" fill="#efe3cf"/>
      <rect x="14" y="28" width="12" height="36" rx="2" fill="url(#waxShade)"/>
      <line x1="20" y1="24" x2="20" y2="29" stroke="#5b4a36" stroke-width="1.4"/>
      <g class="flame">
        <path d="M20 4 C26 12 24 18 20 22 C16 18 14 12 20 4Z" fill="#e0a458"/>
        <path d="M20 10 C23 15 22 19 20 21 C18 19 17 15 20 10Z" fill="#f6d9a0"/>
      </g>
      <defs>
        <linearGradient id="waxShade" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#000" stop-opacity=".18"/>
          <stop offset=".5" stop-color="#000" stop-opacity="0"/>
          <stop offset="1" stop-color="#000" stop-opacity=".18"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <div class="content">
    <div class="panel">
      <div class="primary">
        <span class="eyebrow">Bangladesh · Monsoon Crisis</span>
        <div class="headline">Pray for Chittagong</div>
        <p class="subtext">Record rainfall, floods &amp; landslides have devastated the region</p>
        <p class="meta" id="metaLine">Chittagong &amp; the Hill Tracts · July 2026</p>
      </div>
      <div class="stat">
        <span class="stat-num">30+</span>
        <span class="stat-lbl">Lives Lost</span>
      </div>
    </div>
  </div>
</div>

<script>
// Generate a handful of quiet, irregular rain streaks
const rain = document.getElementById('rain');
const COUNT = 26;
for (let i = 0; i < COUNT; i++) {
  const s = document.createElement('span');
  const left = Math.random() * 100;
  const dur = 1.1 + Math.random() * 1.4;
  const delay = Math.random() * 2.5;
  s.style.left = left + '%';
  s.style.animationDuration = dur + 's';
  s.style.animationDelay = delay + 's';
  rain.appendChild(s);
}
</script>
</body>
</html>
