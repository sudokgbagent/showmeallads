<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pray for Chittagong</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #081018;
  font-family: 'Inter', sans-serif;
}

.banner {
  container-type: size;
  container-name: banner;
  position: relative;
  width: 100%; height: 100%;
  overflow: hidden;
  background: linear-gradient(160deg, #0a1620 0%, #10222f 55%, #142a37 100%);
}

/* ---------------- ambient rain ---------------- */
.rain { position: absolute; inset: 0; pointer-events: none; opacity: .22; z-index: 1; }
.rain span {
  position: absolute; top: -20%; width: 1px; height: 16%;
  background: linear-gradient(to bottom, transparent, rgba(148,180,199,.6), transparent);
  animation: fall linear infinite;
}
@keyframes fall { to { transform: translateY(150%); } }

/* ---------------- rising flood waves (signature element) ---------------- */
.flood {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 30%;
  min-height: 14px;
  z-index: 2;
  overflow: hidden;
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, #000 35%);
          mask-image: linear-gradient(to bottom, transparent 0%, #000 35%);
}
.flood svg { position: absolute; bottom: 0; left: 0; width: 200%; height: 100%; }
.wave-back  { animation: drift 13s linear infinite; opacity: .55; }
.wave-mid   { animation: drift 9s linear infinite reverse; opacity: .75; }
.wave-front { animation: drift 6.5s linear infinite; opacity: .95; }
@keyframes drift {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* subtle rising tide breathing, whole flood block */
.flood-rise { animation: rise 7s ease-in-out infinite; transform-origin: bottom; }
@keyframes rise {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-6%); }
}

/* ---------------- stage: fixed candle column + content, always in sync ---------------- */
.stage {
  position: relative;
  z-index: 4;
  display: flex;
  align-items: stretch;
  height: 100%;
}

/* candle column: reliable fixed-width flex panel, so the candle is always
   vertically centered and never drifts relative to the text or waves */
.candle-col {
  flex: 0 0 auto;
  width: clamp(56px, 16cqw, 104px);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.candle-wrap {
  position: relative;
  animation: bob 4.2s ease-in-out infinite;
}
@keyframes bob {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-8%); }
}
.candle {
  width: clamp(30px, 10cqh, 66px);
  display: block;
  filter: drop-shadow(0 0 8px rgba(224,164,88,.55));
}
.glow {
  position: absolute; left: 50%; top: 50%;
  width: 155%; height: 155%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(224,164,88,.38) 0%, rgba(224,164,88,.14) 45%, transparent 72%);
  z-index: -1;
  animation: glowPulse 3.2s ease-in-out infinite;
}
@keyframes glowPulse {
  0%, 100% { opacity: .8; transform: translate(-50%, -50%) scale(1); }
  50%      { opacity: 1;  transform: translate(-50%, -50%) scale(1.05); }
}

/* ---------------- content ---------------- */
.content {
  flex: 1;
  min-width: 0;
  display: flex; align-items: center;
  padding: 0 clamp(12px, 3cqw, 28px);
}
.panel {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  gap: clamp(8px, 2.5cqw, 22px);
}
.primary {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; justify-content: center;
  gap: clamp(2px, .55cqh, 5px);
}

.eyebrow {
  font-size: clamp(4px, min(1cqh, 1.3cqw), 11px);
  font-weight: 600; letter-spacing: .16em; text-transform: uppercase;
  color: rgba(224,164,88,.9);
}
.headline {
  font-family: 'Fraunces', serif;
  font-style: italic; font-weight: 500;
  font-size: clamp(13px, min(5.4cqh, 7.6cqw), 48px);
  line-height: 1.02;
  letter-spacing: .01em;
  color: #f5f0e4;
  text-shadow: 0 2px 14px rgba(0,0,0,.5);
  white-space: nowrap;
}
.subtext {
  font-size: clamp(4px, min(1.05cqh, 1.4cqw), 13px);
  color: rgba(245,240,228,.78);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.2;
}
.meta {
  font-size: clamp(4px, min(.95cqh, 1.25cqw), 11px);
  font-weight: 500; letter-spacing: .05em; text-transform: uppercase;
  color: rgba(148,190,209,.8);
  white-space: nowrap;
  line-height: 1.2;
}

.stat {
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding-left: clamp(6px, 1.4cqw, 14px);
  border-left: 1px solid rgba(148,180,199,.22);
  text-align: center; line-height: 1.1;
}
.stat-num {
  font-family: 'Fraunces', serif; font-weight: 600;
  font-size: clamp(11px, min(3.8cqh, 4.6cqw), 32px);
  color: #e0a458;
  text-shadow: 0 0 12px rgba(224,164,88,.35);
}
.stat-lbl {
  font-size: clamp(4px, min(1cqh, 1.2cqw), 9px);
  font-weight: 500; letter-spacing: .07em; text-transform: uppercase;
  color: rgba(245,240,228,.55);
  margin-top: 2px;
}

@container banner (max-height: 100px) {
  .eyebrow { display: none; }
  .stat-lbl { display: none; }
  .primary { gap: 0; }
}
@container banner (max-height: 65px) {
  .primary { gap: 0; }
  .candle-col { width: 38px; }
}
@container banner (max-width: 380px) {
  .stat { display: none; }
}
</style>
</head>
<body>

<div class="banner" id="banner">

  <div class="rain" id="rain"></div>

  <div class="flood flood-rise">
    <svg class="wave-back" viewBox="0 0 1600 300" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,120 C200,180 400,60 600,110 C800,160 1000,50 1200,100 C1350,135 1500,90 1600,110 L1600,300 L0,300 Z" fill="#2b5b73" opacity=".65"/>
      <path d="M800,120 C1000,180 1200,60 1400,110 C1550,145 1700,90 1800,110 L1800,300 L800,300 Z" fill="#2b5b73" opacity=".65"/>
    </svg>
    <svg class="wave-mid" viewBox="0 0 1600 300" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,150 C220,90 420,190 640,140 C860,90 1060,190 1280,140 C1420,110 1520,150 1600,140 L1600,300 L0,300 Z" fill="#377390" opacity=".78"/>
      <path d="M800,150 C1020,90 1220,190 1440,140 C1660,90 1860,190 2080,140 L2080,300 L800,300 Z" fill="#377390" opacity=".78"/>
    </svg>
    <svg class="wave-front" viewBox="0 0 1600 300" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,190 C180,150 380,220 580,180 C780,140 980,220 1180,180 C1350,150 1480,190 1600,180 L1600,300 L0,300 Z" fill="#4390ac" opacity=".95"/>
      <path d="M800,190 C980,150 1180,220 1380,180 C1580,140 1780,220 1980,180 L1980,300 L800,300 Z" fill="#4390ac" opacity=".95"/>
      <path d="M0,190 C180,150 380,220 580,180 C780,140 980,220 1180,180 C1350,150 1480,190 1600,180" fill="none" stroke="rgba(198,228,238,.55)" stroke-width="2.5"/>
      <path d="M800,190 C980,150 1180,220 1380,180 C1580,140 1780,220 1980,180" fill="none" stroke="rgba(198,228,238,.55)" stroke-width="2.5"/>
    </svg>
  </div>

  <div class="stage">
    <div class="candle-col">
      <div class="candle-wrap">
        <div class="glow"></div>
        <img class="candle" src="https://i.ibb.co.com/Kptxyh9c/c-ss1-removebg-preview.png" alt="Map of Chittagong">
      </div>
    </div>

    <div class="content">
      <div class="panel">
        <div class="primary">
          <span class="eyebrow">Bangladesh · Monsoon Crisis</span>
          <div class="headline">Pray for Chittagong</div>
          <p class="subtext">Record rainfall, floods &amp; landslides have devastated the region</p>
          <p class="meta">Chittagong &amp; the Hill Tracts · July 2026</p>
        </div>
        <div class="stat">
          <span class="stat-num">30+</span>
          <span class="stat-lbl">Lives Lost</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const rain = document.getElementById('rain');
const COUNT = 24;
for (let i = 0; i < COUNT; i++) {
  const s = document.createElement('span');
  s.style.left = (Math.random() * 100) + '%';
  s.style.animationDuration = (1.1 + Math.random() * 1.3) + 's';
  s.style.animationDelay = (Math.random() * 2.5) + 's';
  rain.appendChild(s);
}
</script>
</body>
</html>
