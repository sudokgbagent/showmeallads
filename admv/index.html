<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Download Now</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      box-sizing: border-box;
    }

    *,
    *::before,
    *::after {
      box-sizing: inherit;
    }

    .fallback-image {
      display: block;
      width: 100%;
      height: auto;
      cursor: pointer;
      z-index: 1;
      position: relative;
    }

    /* Full-width fixed banner row */
    .ad-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      min-height: 50px;
      overflow: visible;
      position: relative;
      z-index: 2;
    }

    .banner-slot {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .banner-slot iframe {
      display: block;
      width: 100% !important;
      max-width: 100% !important;
      border: none;
    }

    /* Social Bar — floating, separate from banner */
    .social-bar-adaptive {
      position: fixed !important;
      z-index: 2147483646 !important;
      overflow: hidden !important;
    }

    .social-bar-adaptive iframe,
    .social-bar-adaptive video {
      max-width: 100% !important;
      max-height: 100% !important;
    }

    @media (max-width: 480px) {
      .social-bar-adaptive {
        width: 72px !important;
        height: 50px !important;
        max-width: 72px !important;
        max-height: 50px !important;
        border-radius: 4px !important;
      }
    }

    @media (min-width: 481px) {
      .social-bar-adaptive {
        width: 300px !important;
        max-width: min(300px, 40vw) !important;
        max-height: min(220px, 35vh) !important;
        border-radius: 8px !important;
      }
    }
  </style>
</head>

<body>

  <img src="ads.jpg" alt="Fallback Image" class="fallback-image" id="fallbackImage">

  <div class="ad-container" id="adContainer">
    <div class="banner-slot" id="bannerSlot">
      <!-- BANNER (zapgd=1359786) — full-width strip like "BEWARE OF FAKE WEBSITES" -->
      <script data-cfasync="false" src="https://d318g7p3azvr44.cloudfront.net/?zapgd=1359786"></script>
    </div>
  </div>

  <!-- SOCIAL BAR (zapgd=1349937) — small corner notification like "Celebs Who Went..." -->
  <script data-cfasync="false" src="https://d318g7p3azvr44.cloudfront.net/?zapgd=1349937"></script>

  <script type="text/javascript">
    const DIRECT_LINK = 'https://ustashewasputtin.com?vV7df=1349889';
    const MOBILE_BREAKPOINT = 480;

    function isMobile() {
      return window.innerWidth <= MOBILE_BREAKPOINT;
    }

    function handleFallbackClick() {
      window.location.href = DIRECT_LINK;
    }

    document
      .getElementById('fallbackImage')
      .addEventListener('click', handleFallbackClick);

    function isSocialBarNode(node) {
      if (!node || node.nodeType !== 1) return false;
      if (node.closest('#adContainer')) return false;
      if (node.classList && node.classList.contains('social-bar-adaptive')) return true;

      const style = window.getComputedStyle(node);
      if (style.position !== 'fixed') return false;

      const rect = node.getBoundingClientRect();
      return rect.width >= 20 && rect.height >= 20;
    }

    function markSocialBarNodes() {
      document.body.querySelectorAll('div, iframe').forEach((node) => {
        if (!isSocialBarNode(node)) return;

        if (node.tagName === 'IFRAME') {
          const parent = node.parentElement;
          if (parent && parent !== document.body && isSocialBarNode(parent)) {
            parent.classList.add('social-bar-adaptive');
          } else {
            node.classList.add('social-bar-adaptive');
          }
        } else {
          node.classList.add('social-bar-adaptive');
        }
      });
    }

    function positionSocialBar() {
      markSocialBarNodes();

      const mobile = isMobile();
      const bannerEl = document.getElementById('adContainer');
      const bannerRect = bannerEl.getBoundingClientRect();

      document.querySelectorAll('.social-bar-adaptive').forEach((el) => {
        if (mobile) {
          const top = bannerRect.height > 0
            ? bannerRect.top + window.scrollY
            : bannerEl.offsetTop;

          el.style.setProperty('top', top + 'px', 'important');
          el.style.setProperty('right', '0', 'important');
          el.style.setProperty('bottom', 'auto', 'important');
          el.style.setProperty('left', 'auto', 'important');
        } else {
          el.style.setProperty('bottom', '12px', 'important');
          el.style.setProperty('right', '12px', 'important');
          el.style.setProperty('top', 'auto', 'important');
          el.style.setProperty('left', 'auto', 'important');
        }
      });
    }

    const bannerObserver = new MutationObserver(() => {
      const iframes = document.querySelectorAll('#bannerSlot iframe, #adContainer iframe');

      if (iframes.length === 0) return;

      document.getElementById('fallbackImage').style.display = 'none';

      const iframe = iframes[0];

      setTimeout(() => {
        positionSocialBar();

        if (window.AndroidInterface) {
          window.AndroidInterface.onAdSizeReceived(
            iframe.offsetWidth,
            iframe.offsetHeight
          );
        }
      }, 150);

      bannerObserver.disconnect();
    });

    const socialBarObserver = new MutationObserver(() => {
      positionSocialBar();
    });

    bannerObserver.observe(document.getElementById('adContainer'), {
      childList: true,
      subtree: true
    });

    socialBarObserver.observe(document.body, {
      childList: true,
      subtree: false
    });

    window.addEventListener('resize', positionSocialBar);
    window.addEventListener('orientationchange', () => {
      setTimeout(positionSocialBar, 200);
    });
  </script>

</body>

</html>
