<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Download Now</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      box-sizing: border-box;
    }

    *,
    *::before,
    *::after {
      box-sizing: inherit;
    }

    .fallback-image {
      display: block;
      width: 100%;
      height: auto;
      cursor: pointer;
      z-index: 1;
      position: relative;
    }

    .ad-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: auto;
      overflow: hidden;
      position: relative;
      z-index: 2;
    }

    .ad-container iframe {
      display: block;
      max-width: 100%;
      width: 100%;
      height: auto;
      border: none;
    }

    .social-bar-adaptive {
      position: fixed !important;
      z-index: 2147483646 !important;
      overflow: hidden !important;
    }

    @media (max-width: 480px) {
      .social-bar-adaptive {
        width: 72px !important;
        height: 50px !important;
        max-width: 72px !important;
        max-height: 50px !important;
      }
    }

    @media (min-width: 481px) {
      .social-bar-adaptive {
        width: 300px !important;
        max-width: min(300px, 40vw) !important;
        max-height: min(220px, 35vh) !important;
      }
    }
  </style>
</head>

<body>

  <img src="ads.jpg" alt="Fallback Image" class="fallback-image" id="fallbackImage">

  <div class="ad-container" id="adContainer">
    <!-- Banner (zapgd=1359786) -->
    <script data-cfasync="false" src="https://d318g7p3azvr44.cloudfront.net/?zapgd=1359786"></script>
  </div>

  <!-- Social Bar (zapgd=1349937) -->
  <script data-cfasync="false" src="https://d318g7p3azvr44.cloudfront.net/?zapgd=1349937"></script>

  <script type="text/javascript">
    const DIRECT_LINK = 'https://ustashewasputtin.com?vV7df=1349889';
    const MOBILE_BREAKPOINT = 480;
    let fallbackHidden = false;

    function handleFallbackClick() {
      window.location.href = DIRECT_LINK;
    }

    document
      .getElementById('fallbackImage')
      .addEventListener('click', handleFallbackClick);

    function isSocialBarElement(el) {
      if (!el || el.nodeType !== 1) return false;
      if (el.classList && el.classList.contains('social-bar-adaptive')) return true;
      if (el.closest && el.closest('.social-bar-adaptive')) return true;

      const style = window.getComputedStyle(el);
      if (style.position === 'fixed') {
        const rect = el.getBoundingClientRect();
        if (rect.width > 0 && rect.width < 350 && rect.height < 250) {
          return true;
        }
      }

      return false;
    }

    function getBannerIframe() {
      const container = document.getElementById('adContainer');

      const inContainer = container.querySelectorAll('iframe');
      if (inContainer.length > 0) {
        return inContainer[0];
      }

      const allIframes = document.querySelectorAll('iframe');
      for (let i = 0; i < allIframes.length; i++) {
        const iframe = allIframes[i];
        if (isSocialBarElement(iframe)) continue;

        const rect = iframe.getBoundingClientRect();
        if (rect.width >= 200) {
          return iframe;
        }
      }

      return null;
    }

    function hideFallbackAndNotify() {
      if (fallbackHidden) return;

      const iframe = getBannerIframe();
      if (!iframe) return;

      fallbackHidden = true;
      document.getElementById('fallbackImage').style.display = 'none';

      setTimeout(() => {
        positionSocialBar();

        if (window.AndroidInterface) {
          window.AndroidInterface.onAdSizeReceived(
            iframe.offsetWidth,
            iframe.offsetHeight
          );
        }
      }, 100);
    }

    function markSocialBarNodes() {
      document.body.querySelectorAll('div, iframe').forEach((node) => {
        if (node.closest('#adContainer')) return;

        const style = window.getComputedStyle(node);
        if (style.position !== 'fixed') return;

        const rect = node.getBoundingClientRect();
        if (rect.width < 20 || rect.height < 20) return;

        if (node.tagName === 'IFRAME') {
          const parent = node.parentElement;
          if (parent && parent !== document.body) {
            parent.classList.add('social-bar-adaptive');
          } else {
            node.classList.add('social-bar-adaptive');
          }
        } else {
          node.classList.add('social-bar-adaptive');
        }
      });
    }

    function positionSocialBar() {
      markSocialBarNodes();

      const mobile = window.innerWidth <= MOBILE_BREAKPOINT;
      const bannerEl = document.getElementById('adContainer');
      const bannerRect = bannerEl.getBoundingClientRect();

      document.querySelectorAll('.social-bar-adaptive').forEach((el) => {
        if (mobile) {
          const top = bannerRect.height > 0
            ? bannerRect.top + window.scrollY
            : bannerEl.offsetTop;

          el.style.setProperty('top', top + 'px', 'important');
          el.style.setProperty('right', '0', 'important');
          el.style.setProperty('bottom', 'auto', 'important');
          el.style.setProperty('left', 'auto', 'important');
        } else {
          el.style.setProperty('bottom', '12px', 'important');
          el.style.setProperty('right', '12px', 'important');
          el.style.setProperty('top', 'auto', 'important');
          el.style.setProperty('left', 'auto', 'important');
        }
      });
    }

    const observer = new MutationObserver(() => {
      hideFallbackAndNotify();
      positionSocialBar();
    });

    observer.observe(document.getElementById('adContainer'), {
      childList: true,
      subtree: true
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });

    window.addEventListener('resize', positionSocialBar);

    setTimeout(hideFallbackAndNotify, 500);
    setTimeout(hideFallbackAndNotify, 1500);
    setTimeout(hideFallbackAndNotify, 3000);
  </script>

</body>

</html>
