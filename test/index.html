<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Now</title>

    <!-- Adsterra Social Bar — load first in head (before banner scripts) -->
    <script
        type="text/javascript"
        async
        src="https://pl27628405.effectivecpmnetwork.com/3e/b9/78/3eb978b7c639361476e384696d79b565.js"
    ></script>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            background: #000;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        .page-content {
            width: 100%;
        }

        .fallback-image {
            display: block;
            width: 100%;
            height: auto;
            cursor: pointer;
        }

        .ad-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
        }

        .ad-container iframe {
            max-width: 100%;
            border: 0;
        }

        /* Let Adsterra floating ads (Social Bar) sit above page content */
        body > div[id^="adsterra"],
        body > div[class*="adsterra"],
        body > iframe[style*="fixed"] {
            z-index: 2147483646 !important;
        }
    </style>
</head>
<body>

    <div class="page-content">
        <img
            id="fallbackImage"
            class="fallback-image"
            src="ad.jpg"
            alt="Support us"
        >

        <!-- Optional: 728x90 banner sits below your image (does not replace it) -->
        <div id="adContainer" class="ad-container">
            <script>
                atOptions = {
                    'key': 'd872602be45058952fa4069d4e716fdf',
                    'format': 'iframe',
                    'height': 90,
                    'width': 728,
                    'params': {}
                };
            </script>
            <script src="https://www.highperformanceformat.com/d872602be45058952fa4069d4e716fdf/invoke.js"></script>
        </div>
    </div>

    <script>
        const fallbackImage = document.getElementById("fallbackImage");

        fallbackImage.addEventListener("click", () => {
            window.location.href =
                "https://www.effectivecpmnetwork.com/bky5ubmt?key=1eac3b1af0d522855e581345e70735a9";
        });

        const observer = new MutationObserver(() => {
            const iframe = document.querySelector(".ad-container iframe");

            if (!iframe) return;

            setTimeout(() => {
                if (window.AndroidInterface) {
                    window.AndroidInterface.onAdSizeReceived(
                        iframe.offsetWidth,
                        iframe.offsetHeight
                    );
                }
            }, 100);

            observer.disconnect();
        });

        observer.observe(document.getElementById("adContainer"), {
            childList: true,
            subtree: true
        });
    </script>

</body>
</html>
