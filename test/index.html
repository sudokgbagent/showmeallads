<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Download Now</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; overflow: visible; background: #000; }

    #banner { display: block; width: 100%; height: auto; cursor: pointer; }

    #ad-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 9999;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    #ad-overlay.visible { display: flex; }

    #ad-box {
      position: relative;
      width: 100%;
      max-width: 468px;
      min-height: 60px;
      background: #111;
    }

    #skip-btn {
      margin-top: 10px;
      color: #fff;
      font-family: sans-serif;
      font-size: 13px;
      background: none;
      border: 1px solid #555;
      padding: 6px 18px;
      cursor: pointer;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <img src="ad.jpg" alt="Support us" id="banner">

  <div id="ad-overlay">
    <div id="ad-box"></div>
    <button id="skip-btn">Skip Ad ✕</button>
  </div>

  <script>
    (function () {
      var overlay = document.getElementById('ad-overlay');
      var adBox = document.getElementById('ad-box');
      var skipBtn = document.getElementById('skip-btn');
      var adLoaded = false;

      function showOverlayAd() {
        if (adLoaded) return;
        adLoaded = true;

        overlay.classList.add('visible');

        var s = document.createElement('script');
        s.src = 'https://pl29608172.effectivecpmnetwork.com/ea/ca/ac/eacaac00f92ff60672cd5950bc007ff6.js';
        adBox.appendChild(s);

        if (window.AndroidInterface) {
          window.AndroidInterface.onAdSizeReceived(adBox.offsetWidth, adBox.offsetHeight);
        }
      }

      skipBtn.addEventListener('click', function () {
        overlay.classList.remove('visible');
      });

      var banner = document.getElementById('banner');

      banner.addEventListener('click', function () {
        showOverlayAd();
        window.location.href = 'https://pensiondignity.com/yz9ddnyrs8?key=853683512e61b90e43fc22f79122afc1';
      });

      banner.addEventListener('load', function () {
        if (window.AndroidInterface) {
          window.AndroidInterface.onAdSizeReceived(banner.offsetWidth, banner.offsetHeight);
        }
      });
    })();
  </script>

</body>
</html>
